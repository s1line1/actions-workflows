# ──────────────────────────────────────────────────────────────
# Docker build & push template — handles compile, image build,
# ACR push, and container-level vulnerability scanning.
#
# Two usage modes:
#   command: build   → npm ci + compile + docker build (no push)
#   command: push    → docker tag + trivy scan + push + sign
# ──────────────────────────────────────────────────────────────

parameters:
  - name: command
    displayName: Build or push
    type: string

  - name: repoName
    type: string
    default: 'myapp'

  - name: imageTag
    type: string
    default: 'latest'

  - name: acrConnection
    type: string
    default: ''

  - name: dockerfile
    type: string
    default: 'Dockerfile'

steps:
  - ${{ if eq(parameters.command, 'build') }}:
    # ── Build phase: compile + unit test ───────────────────
    - script: |
        npm ci
        npm run build
        npm test -- --reporter junit --reporter-options output=$(Common.TestResultsDirectory)/test-results.xml
      displayName: Build & unit test

    - task: PublishTestResults@2
      displayName: Publish test results
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Common.TestResultsDirectory)/test-results.xml'
        mergeTestResults: true
        failTaskOnFailedTests: true
      condition: always()

    - script: |
        docker build \
          --label "git.commit=$(Build.SourceVersion)" \
          --label "git.branch=$(Build.SourceBranch)" \
          --label "build.id=$(Build.BuildId)" \
          --label "build.url=$(Build.BuildUri)" \
          -t ${{ parameters.repoName }}:${{ parameters.imageTag }} \
          -f ${{ parameters.dockerfile }} \
          .
      displayName: Docker build

  - ${{ if eq(parameters.command, 'push') }}:
    # ── Rebuild image (Build & PushACR are separate stages,
    #     potentially different agents — image doesn't carry over) ──
    - script: |
        docker build \
          --label "git.commit=$(Build.SourceVersion)" \
          --label "git.branch=$(Build.SourceBranch)" \
          --label "build.id=$(Build.BuildId)" \
          -t ${{ parameters.repoName }}:${{ parameters.imageTag }} \
          -f ${{ parameters.dockerfile }} \
          .
      displayName: Docker build (pre-push)

    # ── Push phase: push, scan, sign ───────────────────────
    - task: Docker@2
      displayName: ACR login & push
      inputs:
        containerRegistry: '${{ parameters.acrConnection }}'
        repository: '${{ parameters.repoName }}'
        command: 'push'
        tags: '${{ parameters.imageTag }}'

    # ── Container vulnerability scan (Trivy) ───────────────
    - script: |
        curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sh -s -- -b /usr/local/bin v0.50.1
        trivy image \
          --severity HIGH,CRITICAL \
          --exit-code 1 \
          --format sarif \
          --output trivy-report.sarif \
          ${{ parameters.repoName }}:${{ parameters.imageTag }}
      displayName: Trivy container scan
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: Publish Trivy SARIF
      inputs:
        PathtoPublish: 'trivy-report.sarif'
        ArtifactName: 'SarifReports'
      condition: always()

    # ── Sign image with Cosign (optional, guarded) ─────────
    - bash: |
        if [ -n "$(COSIGN_PRIVATE_KEY)" ]; then
          cosign sign --key env://COSIGN_PRIVATE_KEY \
            "$(ACR_LOGIN_SERVER)/${{ parameters.repoName }}@$(docker image inspect ${{ parameters.repoName }}:${{ parameters.imageTag }} --format '{{.RepoDigests}}')"
        else
          echo "⚠️  COSIGN_PRIVATE_KEY not set — skipping image signing"
        fi
      displayName: Cosign container signature
      continueOnError: true
