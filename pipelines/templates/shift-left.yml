# ──────────────────────────────────────────────────────────────
# Shift-Left CI template — lint, SAST, dependency scan, secrets
# Called by azure-pipelines.yml Stage: ShiftLeft
# Each scanType runs in its own job for parallel execution.
# ──────────────────────────────────────────────────────────────

parameters:
  - name: scanType
    displayName: Type of scan to run
    type: string

steps:
  - ${{ if eq(parameters.scanType, 'lint') }}:
    # ── Lint & Format ──────────────────────────────────────
    - script: |
        npm ci
        npx eslint src/ --max-warnings=0
      displayName: ESLint (zero-warning policy)
      workingDirectory: $(System.DefaultWorkingDirectory)
      continueOnError: false

    - script: |
        npx prettier --check src/
      displayName: Prettier format check
      continueOnError: true  # warn, don't block

  - ${{ if eq(parameters.scanType, 'sast') }}:
    # ── SAST — CodeQL (Microsoft-provided) ─────────────────
    - task: CodeQLInit@2
      displayName: CodeQL init
      inputs:
        languages: javascript  # adjust per project: python / csharp / java
      continueOnError: true

    - task: CodeQLAnalyze@2
      displayName: CodeQL analyze
      continueOnError: true

  - ${{ if eq(parameters.scanType, 'dependency') }}:
    # ── Dependency Scan — OWASP Dependency Check ───────────
    - script: |
        npm ci
      displayName: Install (for lockfile)

    - task: DependencyCheck@0
      displayName: OWASP Dependency Check
      inputs:
        projectName: '$(Build.DefinitionName)'
        scanType: 'repository'
        format: 'SARIF'
        failOnCVSS: 7          # fail on High+ vulnerabilities
      continueOnError: true     # gate manually — let pipeline pass but flag

    - task: PublishBuildArtifacts@1
      displayName: Publish SARIF report
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/dependency-check-report.sarif'
        ArtifactName: 'SarifReports'
      condition: always()
      continueOnError: true

  - ${{ if eq(parameters.scanType, 'secret') }}:
    # ── Secret Scan — GitLeaks ─────────────────────────────
    - script: |
        curl -sSfL https://github.com/zricethezav/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz \
          | tar xz gitleaks
        ./gitleaks detect --source . --report-format sarif --report-path gitleaks.sarif --verbose
      displayName: GitLeaks secret scan
      continueOnError: true

    - task: PublishBuildArtifacts@1
      displayName: Publish GitLeaks report
      inputs:
        PathtoPublish: 'gitleaks.sarif'
        ArtifactName: 'SarifReports'
      condition: always()
      continueOnError: true
