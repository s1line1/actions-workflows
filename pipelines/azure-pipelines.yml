# ──────────────────────────────────────────────────────────────
# Production-grade Azure DevOps multi-stage pipeline
# Triggers: PR + main + release branches
# Stages:
#   1) shift-left — lint, SAST, dependency scan, secrets
#   2) build     — compile, unit test, Docker image
#   3) push-acr  — sign, push, scan
#   4) tag       — stamp git release tag for traceability
# ──────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
      - releases/*
  paths:
    exclude:
      - '*.md'
      - .gitignore

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'
      - .gitignore

variables:
  - name: dockerRepoName
    value: 'myapp'
  - name: imageTag
    value: $[format('{0}-{1:yyyyMMdd.HHmmss}.{2}', variables['Build.SourceBranchName'],
                     variables['Build.StartTime'], variables['Build.BuildId'])]

stages:
  # ═══════════════════════════════════════════════════════════
  # STAGE 1 — Shift-Left CI (fail fast, block if critical)
  # ═══════════════════════════════════════════════════════════
  - stage: ShiftLeft
    displayName: 🔎 Shift-Left CI
    dependsOn: []
    jobs:
      - job: Lint
        displayName: Lint & Format
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: templates/shift-left.yml
            parameters:
              scanType: lint

      - job: SAST
        displayName: Static Analysis (SAST)
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: templates/shift-left.yml
            parameters:
              scanType: sast

      - job: DependencyScan
        displayName: Dependency Scan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: templates/shift-left.yml
            parameters:
              scanType: dependency

      - job: SecretScan
        displayName: Secret Scan
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: templates/shift-left.yml
            parameters:
              scanType: secret

  # ═══════════════════════════════════════════════════════════
  # STAGE 2 — Build (compile + unit test + container image)
  # ═══════════════════════════════════════════════════════════
  - stage: Build
    displayName: 📦 Build
    dependsOn: ShiftLeft
    condition: succeeded()
    jobs:
      - job: Compile
        displayName: Compile & Unit Test
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
          - template: templates/docker-build.yml
            parameters:
              command: build
              repoName: $(dockerRepoName)
              imageTag: $(imageTag)

  # ═══════════════════════════════════════════════════════════
  # STAGE 3 — Push to ACR (sign + push + scan)
  # ═══════════════════════════════════════════════════════════
  - stage: PushACR
    displayName: ⬆️ Push ACR
    dependsOn: Build
    condition: and(succeeded(), or(
      eq(variables['Build.SourceBranch'], 'refs/heads/main'),
      startsWith(variables['Build.SourceBranch'], 'refs/heads/releases/')))
    jobs:
      - deployment: PushToACR
        displayName: Push image to Azure Container Registry
        environment: acr-push
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - template: templates/docker-build.yml
                  parameters:
                    command: push
                    repoName: $(dockerRepoName)
                    imageTag: $(imageTag)
                    acrConnection: myAcrServiceConnection

  # ═══════════════════════════════════════════════════════════
  # STAGE 4 — Tag Release (post-push stamp)
  # ═══════════════════════════════════════════════════════════
  - stage: TagRelease
    displayName: 🏷️ Tag Release
    dependsOn: PushACR
    condition: succeeded()
    jobs:
      - job: CreateReleaseTag
        displayName: Stamp Git release tag
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self
            persistCredentials: 'true'
          - bash: |
              set -euo pipefail

              VERSION=$(cat VERSION 2>/dev/null || echo "0.1.0")
              BUILD_META="build.$(Build.BuildId)"
              TAG="v${VERSION}+${BUILD_META}"

              # ── GitHub: re-auth via OAuth token ───────────
              if git remote get-url origin | grep -q 'github.com'; then
                git remote set-url origin \
                  "https://x-access-token:$(SYSTEM_ACCESSTOKEN)@$(echo "$(Build.Repository.Uri)" | sed 's|https://||')"
              fi

              git tag -a "$TAG" -m "Release $TAG — $(Build.SourceVersion)"
              git push origin "$TAG"

              echo "##vso[task.setvariable variable=releaseTag;isOutput=true]$TAG"
            name: stamp
            displayName: Create release tag
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
