name: CI shift-left

on:
  workflow_call:
    inputs:
      acr-name:
        type: string
        default: ''
      run-number:
        type: number
        default: 0
      tag-sha:
        type: string
        default: ''

    outputs:
      has-docker-image:
        description: Whether docker-image.yml with images key was found
        value: ${{ jobs.check-docker-config.outputs.has-docker-image }}

  # push:
  #   branches: [main, 'releases/**']
  #   paths-ignore: ['*.md', '.gitignore']

  # pull_request:
  #   branches: [main]
  #   paths-ignore: ['*.md', '.gitignore']

jobs:
  # ══════════════════════════════════════════════════════════
  # Check — verify docker-image.yml exists and has images key
  # ══════════════════════════════════════════════════════════
  out_inputs:
    name: Set outputs for caller workflow
    runs-on: ubuntu-latest
    steps:
      - name: Output values for caller workflow
        run: |
          echo "arc-name=${{ inputs.arc-name }}"
          echo "run-number=${{ inputs.run-number }}"
          echo "tag-sha=${{ inputs.tag-sha }}"

  check-docker-config:
    name: Check docker config
    runs-on: ${{ github.event_name == 'workflow_call' && inputs.runs-on || 'ubuntu-latest' }}
    outputs:
      has-docker-image: ${{ steps.check.outputs.has-docker-image }}
      image-name: ${{ steps.parse.outputs.image-name }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Check for docker-image.yml with images key
        id: check
        run: |
          if [ -f docker-image.yml ] && grep -q '^images:' docker-image.yml; then
            echo "has-docker-image=true" >> "$GITHUB_OUTPUT"
            echo "docker-image.yml found with images module"
          else
            echo "has-docker-image=false" >> "$GITHUB_OUTPUT"
            echo "docker-image.yml missing or no images key — skipping Docker jobs"
          fi

      - name: Parse docker-image.yml
        if: steps.check.outputs.has-docker-image == 'true'
        id: parse
        run: |
          if [ -f docker-image.yml ] && grep -q '^images:' docker-image.yml; then
            echo "has-docker-image=true" >> "$GITHUB_OUTPUT"
            yq '.images[0] | .name, .dockerfile' docker-image.yml |
            {
              read -r name
              read -r dockerfile
              echo "image-name=$name" >> "$GITHUB_OUTPUT"
              echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"
            }
          else
            echo "has-docker-image=false" >> "$GITHUB_OUTPUT"
          fi

  test-parse:
    name: Test parse step
    runs-on: ubuntu-latest
    needs: check-docker-config
    if: needs.check-docker-config.outputs.has-docker-image == 'true'
    steps:
      - name: Output parsed values
        run: |
          echo "Parsed image name: ${{ needs.check-docker-config.outputs.image-name }}"
          echo "Parsed dockerfile: ${{ needs.check-docker-config.outputs.dockerfile }}"

  # ══════════════════════════════════════════════════════════
  # Lint — Java (Maven)
  # ══════════════════════════════════════════════════════════
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        if: hashFiles('pom.xml') != ''
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -q
        if: hashFiles('pom.xml') != ''

      - name: Check Formatting
        run: |
          if grep -q 'spotless-maven-plugin' pom.xml; then
            mvn spotless:check -q
          else
            echo "spotless not configured, skipping"
          fi
        if: hashFiles('pom.xml') != ''
         
