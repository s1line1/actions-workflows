name: CI shift-left

on:
  workflow_call:
    inputs:
      acr-name:
        type: string
        default: ''
      run-number:
        type: number
        default: 0
      tag-sha:
        type: string
        default: ''
      region:
        type: string
        default: ''
      OSS_BUCKET:
        type: string
        default: ''
      OSS_ENDPOINT:
        type: string
        default: ''

    secrets:
      access_key_id:
        required: false
      access_key_secret:
        required: false

    outputs:
      has-docker-image:
        description: Whether docker-image.yml with images key was found
        value: ${{ jobs.check-docker-config.outputs.has-docker-image }}

  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  check-docker-config:
    name: Check docker config
    uses: ./.github/workflows/_check-docker-config.yml

  test_config:
    name: Test config parsing
    needs: check-docker-config
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "has-docker-image: ${{ needs.check-docker-config.outputs.has-docker-image }}"
          echo "images: ${{ needs.check-docker-config.outputs.images }}"
          echo "tests: ${{ needs.check-docker-config.outputs.tests }}"

  load_secrets:
    name: Load secrets from OSS
    needs: [check-docker-config]
    runs-on: ubuntu-latest
    if: inputs.OSS_ENDPOINT != '' && inputs.OSS_BUCKET != ''
    steps:
      # checkout 当前业务 repo
      - uses: actions/checkout@v4

      # checkout reusable workflow repo
      - name: Checkout actions-workflows
        uses: actions/checkout@v4
        with:
          repository: s1line1/actions-workflows
          path: actions-workflows

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oss2 yq

      - name: Output secrets for debugging
        id: get-secrets
        run: |
          if [ -z "${{ secrets.access_key_id }}" ] || [ -z "${{ secrets.access_key_secret }}" ]; then
            echo "OSS secrets not configured, skipping"
            exit 0
          fi
          pip install oss2
          python ./actions-workflows/scripts/get_oss_secrets.py \
            --ak "${{ secrets.access_key_id }}" \
            --sk "${{ secrets.access_key_secret }}" \
            --endpoint "${{ inputs.OSS_ENDPOINT }}" \
            --bucket "${{ inputs.OSS_BUCKET }}" \
            --key secrets.json >> $GITHUB_ENV

      - name: Login to ACR
        if: env.DOCKER_ALICLOUD_USERNAME != '' && env.DOCKER_ALICLOUD_PASSWORD != ''
        run: |
          if [ -z "${{ fromJSON(needs.check-docker-config.outputs.images)[0].registry }}" ]; then
            echo "Registry not found in docker-image.yml, skipping"
            exit 0
          fi
          echo "$DOCKER_ALICLOUD_PASSWORD" | docker login -u "$DOCKER_ALICLOUD_USERNAME" \
                  --password-stdin "${{ fromJSON(needs.check-docker-config.outputs.images)[0].registry }}"

  unit_test:
    name: Run ${{ fromJSON(needs.check-docker-config.outputs.tests)[0].name }} Unit Tests
    needs: [check-docker-config]
    if: needs.check-docker-config.outputs.has-docker-image == 'true' && needs.check-docker-config.outputs.tests != '[]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        if: fromJSON(needs.check-docker-config.outputs.tests)[0].dockerfile != 'null' && hashFiles( fromJSON(needs.check-docker-config.outputs.tests)[0].dockerfile ) != ''
        run: |
          docker build \
            -f ${{ fromJSON(needs.check-docker-config.outputs.tests)[0].dockerfile }} \
            -t springboot-test:${{ github.sha }} \
            .

      - name: Run mvn clean verify
        if: fromJSON(needs.check-docker-config.outputs.tests)[0].command != 'null' && hashFiles( fromJSON(needs.check-docker-config.outputs.tests)[0].command ) != ''
        run: |
          docker run --rm \
            springboot-test:${{ github.sha }} \
            bash ${{ fromJSON(needs.check-docker-config.outputs.tests)[0].command }}


  # ══════════════════════════════════════════════════════════
  # Lint — Java (Maven)
