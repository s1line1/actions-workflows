name: Build Image

on:
  workflow_call:
    inputs:
      has-docker-image:
        required: true
        type: boolean
      docker-username:
        required: true
        type: string
      docker-password:
        required: true
        type: string
      images:
        required: true
        type: string

jobs:
  build-docker-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    if: inputs.has-docker-image
    steps:
      - name: test 
        run: echo "Building Docker image as docker-image.yml with images key was found"

      - name: Login to ACR
        if: ${{ inputs.docker-username }} != '' && ${{ inputs.docker-password }} != ''
        run: |
          if [ -z "${{ fromJSON(inputs.images)[0].registry }}" ]; then
            echo "Registry not found in docker-image.yml, skipping"
            exit 0
          fi
          echo "${{ inputs.docker-password }}" | docker login -u "${{ inputs.docker-username }}" \
                  --password-stdin "${{ fromJSON(inputs.images)[0].registry }}"