name: Docker Deploy

on:
  workflow_call:
    inputs:
      OSS_ENDPOINT:
        type: string
        required: true
      OSS_BUCKET:
        type: string
        required: true
      DEPLOY_ENV:
        type: string
        default: 'dev'
      trigger-event:
        type: string
        default: ''

    secrets:
      ACCESS_KEY_ID:
        required: true
      ACCESS_KEY_SECRET:
        required: true
      DEPLOY_REPO_TOKEN:
        required: true
    
jobs:
  deploy_load_secrets:
    name: Load secrets from OSS
    uses: ./.github/workflows/_load-secrets.yml
    with:
      OSS_ENDPOINT: ${{ inputs.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ inputs.OSS_BUCKET }}
      SECRETS: true
    secrets:
      ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
      ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}

  deploy_load_private_key:
    name: Load private key from OSS
    uses: ./.github/workflows/_load-secrets.yml
    with:
      OSS_ENDPOINT: ${{ inputs.OSS_ENDPOINT }}
      OSS_BUCKET: ${{ inputs.OSS_BUCKET }}
      PRIVATE_KEY: true
    secrets:
      ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
      ACCESS_KEY_SECRET: ${{ secrets.ACCESS_KEY_SECRET }}
  

  deploy:
    name: Deploy Docker Image
    runs-on: ubuntu-latest
    needs: [deploy_load_private_key, deploy_load_secrets]
    steps:
      - name: Checkout Terraform Config
        uses: actions/checkout@v4
        with:
          repository: s1line1/terraform_demo
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: tf-config

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Get ECS IP or Fallback
        env:
          ALICLOUD_ACCESS_KEY: ${{ needs.deploy_load_secrets.outputs.terraform-user-access-key }}
          ALICLOUD_SECRET_KEY: ${{ needs.deploy_load_secrets.outputs.terraform-user-secret-key }}
        run: |
          cd tf-config/projects/github-actions-demo
          terraform init
          ECS_IPS=$(terraform output -json public_ips 2>/dev/null) || true
          if [ -n "$ECS_IPS" ] && echo "$ECS_IPS" | jq -e . >/dev/null 2>&1; then
            echo "[${{ inputs.DEPLOY_ENV }}]" > /tmp/inventory.ini
            echo "$ECS_IPS" | jq -r 'if type == "array" then .[] else . end' >> /tmp/inventory.ini
            echo "Using terraform IPs: $(cat /tmp/inventory.ini)"
          fi

      - name: Checkout ansible repo
        uses: actions/checkout@v4
        with:
          repository: s1line1/ansible-playbook
          path: ansible-playbook
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Deploy with Ansible
        run: |
          INVENTORY="/tmp/inventory.ini"
          if [ ! -f "$INVENTORY" ]; then
            INVENTORY="github-actions-demo/inventory.ini"
          fi
          echo "Using inventory: $INVENTORY"
          cd ansible-playbook && \
          ANSIBLE_HOST_KEY_CHECKING=false ansible-playbook -i $INVENTORY github-actions-demo/deploy.yml \
          -e "env=${{ inputs.DEPLOY_ENV }} acr_password=${{ needs.deploy_load_secrets.outputs.docker-password }}" --private-key ~/.ssh/id_rsa -u root
