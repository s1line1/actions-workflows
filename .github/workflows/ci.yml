# ──────────────────────────────────────────────────────────────
# Production-grade CI/CD — lint → SAST → build → ACR → tag
# ──────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main, 'releases/**']
    paths-ignore: ['*.md', .gitignore]
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', .gitignore]

env:
  ACR_NAME: mycompany.azurecr.io
  IMAGE_NAME: myapp
  # Docker tags cannot contain '/'; avoid ref_name for release branches
  IMAGE_TAG: ${{ github.run_number }}-${{ github.sha_short }}

jobs:
  # ══════════════════════════════════════════════════════════
  # Lint
  # ══════════════════════════════════════════════════════════
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 20
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - run: npx eslint src/ --max-warnings=0
        if: hashFiles('package.json') != ''
      - run: npx prettier --check src/
        if: hashFiles('package.json') != ''
        continue-on-error: true

  # ══════════════════════════════════════════════════════════
  # SAST — CodeQL
  # ══════════════════════════════════════════════════════════
  sast:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript  # adjust per project
      - uses: github/codeql-action/analyze@v3

  # ══════════════════════════════════════════════════════════
  # Dependency Scan — OWASP Dependency Check
  # ══════════════════════════════════════════════════════════
  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 20
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - uses: dependency-check/Dependency-Check_Action@v1
        continue-on-error: true
        with:
          project: ${{ github.repository }}
          path: .
          format: SARIF
          failOnCVSS: 7
      - uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: reports/dependency-check-report.sarif

  # ══════════════════════════════════════════════════════════
  # Secret Scan — GitLeaks
  # ══════════════════════════════════════════════════════════
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

  # ══════════════════════════════════════════════════════════
  # Build — compile + test + Docker image
  # ══════════════════════════════════════════════════════════
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [lint, sast, dependency-scan, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 20
      - run: npm ci
        if: hashFiles('package-lock.json') != ''
      - run: npm run build
        if: hashFiles('package.json') != ''
      - run: npm test
        if: hashFiles('package.json') != ''
      - name: Docker build
        run: |
          docker build \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.run=${{ github.run_id }}" \
            -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .

  # ══════════════════════════════════════════════════════════
  # Push to ACR (main / releases only)
  # ══════════════════════════════════════════════════════════
  push-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main' || startsWith(github.ref_name, 'releases/')
    steps:
      - uses: actions/checkout@v4
      - uses: azure/docker-login@v1
        with:
          login-server: ${{ env.ACR_NAME }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Docker build & push
        run: |
          docker build \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.run=${{ github.run_id }}" \
            -t ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            .
          docker push ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ env.ACR_NAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
      - uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

  # ══════════════════════════════════════════════════════════
  # Tag Release — stamp git tag after successful push
  # ══════════════════════════════════════════════════════════
  tag-release:
    name: Tag Release
    runs-on: ubuntu-latest
    needs: push-acr
    if: github.ref_name == 'main' || startsWith(github.ref_name, 'releases/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          set -euo pipefail
          VERSION=$(cat VERSION 2>/dev/null || echo "0.1.0")
          TAG="v${VERSION}+build.${{ github.run_id }}"
          git tag -a "$TAG" -m "Release $TAG — ${{ github.sha }}"
          git push origin "$TAG"
