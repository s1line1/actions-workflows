name: Load Secrets From ALIClOUD OSS

on:
  workflow_call:
    inputs:
      OSS_ENDPOINT:
        type: string
        required: true
      OSS_BUCKET:
        type: string
        required: true
      SECRETS:
        type: boolean
        default: false
      PRIVATE_KEY:
        type: boolean
        default: false
    outputs:
      docker-username:
        description: Docker registry username loaded from OSS secrets
        value: ${{ jobs.load_secrets.outputs.docker-username }}
      docker-password:
        description: Docker registry password loaded from OSS secrets
        value: ${{ jobs.load_secrets.outputs.docker-password }}
      region-id:
        description: Region ID loaded from OSS secrets
        value: ${{ jobs.load_secrets.outputs.region-id }}
      terraform-user-access-key:
        description: Terraform user access key loaded from OSS secrets
        value: ${{ jobs.load_secrets.outputs.terraform-user-access-key }}
      terraform-user-secret-key:
        description: Terraform user secret key loaded from OSS secrets
        value: ${{ jobs.load_secrets.outputs.terraform-user-secret-key }}

    secrets:
      ACCESS_KEY_ID:
        required: true
      ACCESS_KEY_SECRET:
        required: true

jobs:
  load_secrets:
    name: Load secrets from OSS
    runs-on: ubuntu-latest
    if: inputs.SECRETS && inputs.OSS_ENDPOINT != '' && inputs.OSS_BUCKET != ''
    outputs:
      docker-username: ${{ steps.export-docker-creds.outputs.docker-username }}
      docker-password: ${{ steps.export-docker-creds.outputs.docker-password }}
      region-id: ${{ steps.export-docker-creds.outputs.region-id }}
      terraform-user-access-key: ${{ steps.export-docker-creds.outputs.terraform-user-access-key }}
      terraform-user-secret-key: ${{ steps.export-docker-creds.outputs.terraform-user-secret-key }}
    steps:
      # checkout 当前业务 repo
      - uses: actions/checkout@v4

      # checkout reusable workflow repo
      - name: Checkout actions-workflows
        uses: actions/checkout@v4
        with:
          repository: s1line1/actions-workflows
          path: actions-workflows

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oss2 yq

      - name: Output secrets for debugging
        id: get-secrets
        run: |
          if [ -z "${{ secrets.ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.ACCESS_KEY_SECRET }}" ]; then
            echo "ACCESS_KEY_ID or ACCESS_KEY_SECRET not configured, skipping"
            exit 0
          fi
          pip install oss2
          python ./actions-workflows/scripts/get_oss_secrets.py \
            --ak "${{ secrets.ACCESS_KEY_ID }}" \
            --sk "${{ secrets.ACCESS_KEY_SECRET }}" \
            --endpoint "${{ inputs.OSS_ENDPOINT }}" \
            --bucket "${{ inputs.OSS_BUCKET }}" \
            --key secrets.json >> $GITHUB_ENV

      - name: Export docker creds for downstream jobs
        id: export-docker-creds
        run: |
          echo "docker-username=${DOCKER_ALICLOUD_USERNAME}" >> "$GITHUB_OUTPUT"
          echo "docker-password=${DOCKER_ALICLOUD_PASSWORD}" >> "$GITHUB_OUTPUT"
          echo "region-id=${DOCKER_ALICLOUD_REGION_ID}" >> "$GITHUB_OUTPUT"
          echo "terraform-user-access-key=${TERRAFORM_USER_ACCESS_KEY}" >> "$GITHUB_OUTPUT"
          echo "terraform-user-secret-key=${TERRAFORM_USER_SECRET_KEY}" >> "$GITHUB_OUTPUT"

  load_private_key:
    name: Load private key from OSS
    runs-on: ubuntu-latest
    if: inputs.PRIVATE_KEY == true && inputs.OSS_ENDPOINT != '' && inputs.OSS_BUCKET != ''
    steps:
      # checkout 当前业务 repo
      - uses: actions/checkout@v4

      # checkout reusable workflow repo
      - name: Checkout actions-workflows
        uses: actions/checkout@v4
        with:
          repository: s1line1/actions-workflows
          path: actions-workflows

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install oss2 yq

      - name: Fetch private key
        run: |
          if [ -z "${{ secrets.ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.ACCESS_KEY_SECRET }}" ]; then
            echo "ACCESS_KEY_ID or ACCESS_KEY_SECRET not configured, skipping"
            exit 0
          fi
          pip install oss2
          python ./actions-workflows/scripts/get_oss_file.py \
            --ak "${{ secrets.ACCESS_KEY_ID }}" \
            --sk "${{ secrets.ACCESS_KEY_SECRET }}" \
            --endpoint "${{ inputs.OSS_ENDPOINT }}" \
            --bucket "${{ inputs.OSS_BUCKET }}" \
            --key root.pem \
            --output ~/.ssh/id_rsa

      - name: Setup SSH
        run: |
          chmod 600 ~/.ssh/id_rsa
